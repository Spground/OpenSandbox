name: Sandbox K8S E2E Tests

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'kubernetes/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.24'

jobs:
  e2e-k8s:
    name: E2E Tests (K8s v${{ matrix.k8s-version }}, Kind ${{ matrix.kind-version }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - k8s-version: "1.20.0"
            kind-version: "v0.17.0" # to fix incompatibility
          - k8s-version: "1.21.1"
            kind-version: "v0.31.0"
          - k8s-version: "1.22.4"
            kind-version: "v0.31.0"
          - k8s-version: "1.24.4"
            kind-version: "v0.31.0"
          - k8s-version: "1.26.4"
            kind-version: "v0.31.0"
          - k8s-version: "1.28.6"
            kind-version: "v0.31.0"
          - k8s-version: "1.30.4"
            kind-version: "v0.31.0"
          - k8s-version: "1.32.2"
            kind-version: "v0.31.0"
          - k8s-version: "1.34.2"
            kind-version: "v0.31.0"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: |
          cd kubernetes
          make test-e2e KIND_REINSTALL=true KIND_VERSION=${{ matrix.kind-version }} KIND_K8S_VERSION=v${{ matrix.k8s-version }}